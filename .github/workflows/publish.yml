name: 'Publish NuGet Packages'

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.0.0)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  publish:
    name: Publish to NuGet
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.125

    - name: Verify build and tests (benchmarks disabled in publish)
      run: bash scripts/verify.sh --run-restore 1 --run-benchmarks 0

    - name: Pack packages
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        bash scripts/pack.sh --version "$VERSION" --out ./nupkg

    - name: Push to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        bash scripts/publish.sh \
          --version "$VERSION" \
          --out ./nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key "$NUGET_API_KEY"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
