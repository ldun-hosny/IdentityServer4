name: 'Publish NuGet Packages'

on:
  push:
    tags:
    - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.0.0)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  publish:
    name: Publish to NuGet
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        git init "$GITHUB_WORKSPACE"
        cd "$GITHUB_WORKSPACE"
        git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git fetch --tags --prune --depth=1 origin "$GITHUB_SHA"
        git checkout --detach FETCH_HEAD

    - name: Install .NET SDK
      run: |
        set -euo pipefail
        curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
        bash dotnet-install.sh --version 8.0.125 --install-dir "$HOME/.dotnet"
        echo "$HOME/.dotnet" >> "$GITHUB_PATH"

    - name: Verify build and tests (benchmarks disabled in publish)
      run: bash scripts/verify.sh --run-restore 1 --run-benchmarks 0

    - name: Pack packages
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        bash scripts/pack.sh --version "$VERSION" --out ./nupkg

    - name: Push to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
        fi
        bash scripts/publish.sh \
          --version "$VERSION" \
          --out ./nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key "$NUGET_API_KEY"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG="v${{ github.event.inputs.version }}"
        else
          TAG="${GITHUB_REF_NAME}"
        fi

        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release already exists for $TAG"
        else
          gh release create "$TAG" --target "$GITHUB_SHA" --generate-notes
        fi
